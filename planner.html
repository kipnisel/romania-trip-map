<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מתכנן המסלול · טיול רומניה 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧩</text></svg>">
<style>
  :root{
    --ground:#f1f4f0; --surface:#fff; --ink:#15231c; --muted:#5b6a61; --line:#e0e6df;
    --fag:#2f6d4f; --bra:#2b6079; --buc:#b07514; --shab:#5b5391; --warn:#c26a1c; --warnbg:#fdf3e6;
    --shadow:0 2px 10px rgba(20,40,30,.08);
    --sans:system-ui,"Segoe UI",Roboto,"Noto Sans Hebrew",Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);line-height:1.45}
  .wrap{max-width:1100px;margin:0 auto;padding:0 12px}
  a{color:inherit}
  .topnav{position:sticky;top:0;z-index:30;background:rgba(241,244,240,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:7px 0}
  .topnav .wrap{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;align-items:center}
  .topnav a,.topnav button{text-decoration:none;font-family:var(--sans);font-size:.78rem;font-weight:700;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:6px 11px;white-space:nowrap;cursor:pointer;color:var(--ink)}
  .topnav a.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  #sync{font-size:.72rem;color:var(--muted);font-weight:700;padding:0 4px}
  header{padding:12px 0 2px;text-align:center}
  header h1{font-size:1.35rem;margin:.15em 0}
  header p{color:var(--muted);margin:.15em 0;font-size:.82rem}

  .layout{display:grid;gap:10px;grid-template-columns:1fr 126px;align-items:start;padding:10px 0 44px}
  @media(min-width:700px){.layout{grid-template-columns:1fr 250px}}
  .board{display:flex;flex-direction:column;gap:10px;min-width:0}
  .bank{position:sticky;top:50px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:9px;box-shadow:var(--shadow);max-height:calc(100vh - 64px);overflow:auto;min-width:0}
  .bank h2{font-size:.9rem;margin:0 0 2px}
  .bank .sub{font-size:.66rem;color:var(--muted);margin-bottom:6px}
  .bankgrp{margin-bottom:7px}
  .grph{font-size:.66rem;font-weight:800;color:var(--muted);margin:5px 0 3px;display:flex;gap:5px;align-items:center;position:sticky;top:0;background:var(--surface);cursor:pointer;padding:2px 0}
  .grph:hover{color:var(--ink)}
  .grph .cv{width:11px;display:inline-block;text-align:center;color:var(--ink)}
  .grph .n{background:#e7ede6;border-radius:999px;padding:0 6px;font-variant-numeric:tabular-nums;margin-inline-start:auto}
  .bankchips{display:flex;flex-direction:column;gap:5px}

  .chip{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:9px;padding:6px 8px;background:var(--surface);
    cursor:grab;touch-action:none;user-select:none;border-inline-start:4px solid var(--ac);width:100%;min-width:0;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .chip.sel{outline:2px solid var(--ink);outline-offset:1px}
  .chip .ci{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
  .chip .nm{font-size:.74rem;font-weight:650;line-height:1.25}
  .chip .mt{font-size:.6rem;color:var(--muted)}
  .chip .bad{color:var(--warn);font-weight:800}
  .chip .info{flex:0 0 auto;border:none;background:none;cursor:pointer;font-size:1rem;color:var(--muted);padding:0 2px;line-height:1;touch-action:auto}
  .chip .info:hover{color:var(--bra)}
  .chip.dragging{opacity:.4}

  .day{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 11px;box-shadow:var(--shadow);border-top:4px solid var(--ac);display:flex;flex-direction:column;gap:6px}
  .day.over{outline:2px dashed var(--ac);outline-offset:2px;background:color-mix(in srgb,var(--ac) 7%,#fff)}
  .day.hasissue{border-top-color:var(--warn)}
  .day.shab{--ac:var(--shab)}
  .day.locked{opacity:.72;background:#f3f5f3}
  .day-h{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
  .day-h b{font-size:.72rem;font-weight:800;color:var(--ac);letter-spacing:.3px}
  .day-h .dt{font-size:.74rem;color:var(--muted);font-variant-numeric:tabular-nums}
  .day-h .rg{margin-inline-start:auto;font-size:.63rem;font-weight:700;color:var(--ac);background:color-mix(in srgb,var(--ac) 12%,#fff);border-radius:999px;padding:1px 7px}
  .day .note{font-size:.66rem;color:var(--muted)}
  .drop{display:flex;flex-wrap:wrap;gap:6px;min-height:30px}
  .drop .chip{width:auto;min-width:130px;flex:1 1 160px}
  @media(max-width:520px){.drop .chip{flex-basis:100%}}
  .placeholder{border:1.5px dashed var(--line);border-radius:9px;padding:8px;text-align:center;color:#9aa8a0;font-size:.7rem;width:100%}
  .issues{display:flex;flex-direction:column;gap:4px}
  .issue{font-size:.69rem;background:var(--warnbg);color:var(--warn);border:1px solid #f0dcc0;border-radius:7px;padding:4px 7px}
  .day-x{align-self:flex-start;font-size:.64rem;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline}

  #ghost{position:fixed;z-index:200;pointer-events:none;opacity:.92;transform:translate(-50%,-50%) rotate(-2deg);box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:180px}
  .hint{background:#eef3f6;border:1px solid #d6e4ec;border-radius:9px;padding:7px 11px;font-size:.76rem;color:#2b5066;margin:8px 0}
  footer{color:var(--muted);font-size:.72rem;text-align:center;padding:16px 0}

  /* info popup */
  .ov{position:fixed;inset:0;background:rgba(15,25,20,.5);z-index:120;display:none;align-items:flex-end;justify-content:center}
  .ov.open{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:18px;box-shadow:var(--shadow)}
  @media(min-width:520px){.ov{align-items:center}.sheet{border-radius:18px}}
  .sheet .sh-h{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .sheet h3{font-size:1.1rem;margin:0;flex:1}
  .sheet .x{border:none;background:var(--ground);border-radius:8px;width:30px;height:30px;font-size:1.05rem;cursor:pointer;color:var(--muted)}
  .sheet .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .sheet .cchip{font-size:.7rem;font-weight:700;border-radius:999px;padding:2px 9px;background:color-mix(in srgb,var(--ac) 13%,#fff);color:var(--ac)}
  .sheet p{font-size:.9rem;color:#33443b;margin:0 0 12px}
  .sheet .lnks{display:flex;gap:8px;flex-wrap:wrap}
  .sheet .lnks a{text-decoration:none;font-size:.82rem;font-weight:700;border-radius:9px;padding:9px 13px;border:1px solid var(--line);color:var(--ink)}
  .sheet .lnks a.pri{background:var(--bra);color:#fff;border-color:var(--bra)}
</style>
</head>

const REC={peles:1,fagaras:1,balea:2,telecabina:2,dragus:3,sambata:3,astra:4,zoosibiu:4,sibiu:4,tampa:5,sfatului:6,bran:7,dino:7,rasnov:7,aventura:8,prejmer:8,postavaru:8,slanic:9,therme:10,herastrau:10,amckart:10};

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwJBISpWWpkDL9U9RX9VLWFfVnF5fpElhEr5uK4coYhv8SX-tevo0R8uZI8jcTh7GxvXg/exec";
const configured=SCRIPT_URL && !SCRIPT_URL.includes("PASTE_YOUR");
const KEY="ro2026_planner";
let state=loadLocal(), selectedId=null, lastLocalChange=0;
let collapsed=loadCollapsed();

function emptyState(){const o={};ACTS.forEach(a=>o[a.id]=null);return o;}
function loadLocal(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s){const o=emptyState();Object.keys(s).forEach(k=>{if(k in o)o[k]=s[k];});return o;}}catch(e){}return emptyState();}
function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify(assignedOnly()));}catch(e){}}
function assignedOnly(){const o={};ACTS.forEach(a=>{if(state[a.id]!=null)o[a.id]=state[a.id];});return o;}
function norm(o){return Object.keys(o||{}).sort().map(k=>k+':'+o[k]).join('|');}
function applyAssigned(asg){const o=emptyState();Object.keys(asg||{}).forEach(id=>{if(id in o)o[id]=asg[id];});return o;}
function loadCollapsed(){try{return new Set(JSON.parse(localStorage.getItem('ro2026_collapsed')||'[]'));}catch(e){return new Set();}}
function saveCollapsed(){try{localStorage.setItem('ro2026_collapsed',JSON.stringify([...collapsed]));}catch(e){}}
function toggleCat(cat){collapsed.has(cat)?collapsed.delete(cat):collapsed.add(cat);saveCollapsed();render();}
function isLocked(dv){return dv!=='bank'&&dv!=null&&DAYS[+dv]&&DAYS[+dv].locked;}
function setSync(t){const el=document.getElementById('sync');if(el)el.textContent=t;}

function jsonp(url){return new Promise((res,rej)=>{const cb='cb_'+Math.floor(Math.random()*1e9);
  window[cb]=d=>{res(d);cl();};const s=document.createElement('script');s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
  s.onerror=()=>{rej(new Error('x'));cl();};function cl(){delete window[cb];s.remove();}document.body.appendChild(s);});}
function persist(){saveLocal();lastLocalChange=Date.now();postPlan();}
function postPlan(){if(!configured){setSync('💾 מקומי');return;}setSync('☁️ שומר…');
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({poi:'__plan__',name:'planner',rating:'',comment:JSON.stringify(assignedOnly())})})
  .then(()=>setSync('☁️ מסונכרן')).catch(()=>setSync('⚠️ לא נשמר'));}
async function fetchRemotePlan(){if(!configured)return null;try{const d=await jsonp(SCRIPT_URL);const revs=Array.isArray(d)?d:(d.reviews||[]);
  const plans=revs.filter(r=>r.poi==='__plan__'&&r.comment);if(!plans.length)return null;
  plans.sort((a,b)=>String(a.timestamp).localeCompare(String(b.timestamp)));return JSON.parse(plans[plans.length-1].comment);}catch(e){return null;}}

function haversine(a,b){const R=6371,r=x=>x*Math.PI/180;const dLat=r(b.lat-a.lat),dLng=r(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLng/2)**2;return 2*R*Math.asin(Math.sqrt(s));}
function actsIn(d){return ACTS.filter(a=>state[a.id]===d);}
function issuesFor(d){
  const day=DAYS[d],acts=actsIn(d),list=[],badIds=new Set();
  acts.forEach(a=>{if(!day.regions.includes(a.area)){list.push(`📍 ${a.name}: אזור ${a.area} — לא תואם ליום (${day.regions.join('/')})`);badIds.add(a.id);}});
  if(day.shab) acts.forEach(a=>{if(!(a.cat==='תרבות'&&day.regions.includes(a.area))){list.push(`🕯️ ${a.name}: לא מתאים לשבת`);badIds.add(a.id);}});
  let maxd=0,pair=null;
  for(let i=0;i<acts.length;i++)for(let j=i+1;j<acts.length;j++){const dd=haversine(acts[i],acts[j]);if(dd>maxd){maxd=dd;pair=[acts[i],acts[j]];}}
  if(maxd>45&&pair) list.push(`↔️ מרחק גדול: ~${Math.round(maxd)} ק"מ בין ${pair[0].name} ל${pair[1].name}`);
  if(acts.length>4) list.push(`🕒 יום עמוס — ${acts.length} פעילויות`);
  return {list,badIds};
}

const bankEl=document.getElementById('bank'), boardEl=document.getElementById('board');
function chipHTML(a,badIds){
  const bad=badIds&&badIds.has(a.id);
  return `<div class="chip${selectedId===a.id?' sel':''}" data-id="${a.id}" style="--ac:${AC[a.area]}">
    <div class="ci"><span class="nm">${a.ic} ${a.name} ${bad?'<span class="bad">⚠</span>':''}</span><span class="mt">${a.area} · ${a.cat}</span></div>
    <button class="info" data-info="${a.id}" aria-label="פרטים">ⓘ</button></div>`;
}
function renderBank(){
  const inBank=ACTS.filter(a=>state[a.id]==null);
  document.getElementById('bankcount').textContent=`${inBank.length} לשיבוץ`;
  const groups={};inBank.forEach(a=>{(groups[a.cat]=groups[a.cat]||[]).push(a);});
  let h='';CATORDER.forEach(cat=>{if(groups[cat]){const isC=collapsed.has(cat);
    h+=`<div class="bankgrp"><div class="grph" data-cat="${cat}"><span class="cv">${isC?'▸':'▾'}</span>${cat}<span class="n">${groups[cat].length}</span></div>${isC?'':`<div class="bankchips">${groups[cat].map(a=>chipHTML(a)).join('')}</div>`}</div>`;}});
  bankEl.innerHTML=h||'<div class="placeholder">הכל שובץ 🎉</div>';
}
function renderBoard(){
  boardEl.innerHTML=DAYS.map((day,d)=>{
    const rg=day.regions.join('/'), acc=AC[day.regions[0]];
    if(day.locked) return `<div class="day locked" data-day="${d}" style="--ac:${acc}"><div class="day-h"><b>${day.n}</b><span class="dt">${day.dt}</span><span class="rg">${rg}</span></div><div class="note">${day.note}</div><div class="placeholder">🔒 ${d===0?'יום הגעה — אין שיבוץ':'יום טיסה — אין שיבוץ'}</div></div>`;
    const {list,badIds}=issuesFor(d),acts=actsIn(d);
    const chips=acts.map(a=>chipHTML(a,badIds)).join('')||'<div class="placeholder">גרור/הקש לשיבוץ פעילות</div>';
    const iss=list.length?`<div class="issues">${list.map(t=>`<div class="issue">${t}</div>`).join('')}</div>`:'';
    const clr=acts.length?`<button class="day-x" data-clear="${d}">נקה יום</button>`:'';
    return `<div class="day${day.shab?' shab':''}${list.length?' hasissue':''}" data-day="${d}" style="--ac:${acc}"><div class="day-h"><b>${day.n}</b><span class="dt">${day.dt}</span><span class="rg">${rg}</span></div><div class="note">${day.note}</div><div class="drop">${chips}</div>${iss}${clr}</div>`;
  }).join('');
}
function render(){renderBank();renderBoard();bindChips();}
function assign(id,day){if(isLocked(day))return;state[id]=(day==='bank'||day==null)?null:+day;selectedId=null;persist();render();}

let suppressClick=false;
document.addEventListener('click',e=>{
  if(suppressClick){suppressClick=false;return;}
  const inf=e.target.closest('[data-info]'); if(inf){openInfo(inf.dataset.info);return;}
  const catH=e.target.closest('.grph[data-cat]'); if(catH){toggleCat(catH.dataset.cat);return;}
  const clr=e.target.closest('[data-clear]'); if(clr){const d=+clr.dataset.clear;ACTS.forEach(a=>{if(state[a.id]===d)state[a.id]=null;});persist();render();return;}
  const dayEl=e.target.closest('[data-day]');
  if(selectedId && dayEl){if(isLocked(dayEl.dataset.day))return;assign(selectedId,dayEl.dataset.day);return;}
});

// pointer drag
let dragId=null,dragEl=null,ghost=null,sx=0,sy=0,dragging=false,lastOver=null;
function bindChips(){
  document.querySelectorAll('.chip[data-id]').forEach(el=>{
    el.addEventListener('pointerdown',ev=>{
      if(ev.target.closest('.info'))return;                 // כפתור מידע — לא מתחיל גרירה
      dragId=el.dataset.id;dragEl=el;sx=ev.clientX;sy=ev.clientY;dragging=false;suppressClick=false;
      window.addEventListener('pointermove',onMove);window.addEventListener('pointerup',onUp,{once:true});
    });
  });
}
function onMove(ev){if(!dragId)return;
  if(!dragging&&Math.hypot(ev.clientX-sx,ev.clientY-sy)>7){dragging=true;dragEl.classList.add('dragging');
    ghost=dragEl.cloneNode(true);ghost.id='ghost';ghost.style.width=dragEl.offsetWidth+'px';document.body.appendChild(ghost);}
  if(dragging){ev.preventDefault();ghost.style.left=ev.clientX+'px';ghost.style.top=ev.clientY+'px';hi(ev.clientX,ev.clientY);}}
function onUp(ev){window.removeEventListener('pointermove',onMove);suppressClick=true;
  if(dragging){const t=targetAt(ev.clientX,ev.clientY);if(t!==null)assign(dragId,t);
    if(ghost){ghost.remove();ghost=null;}dragEl&&dragEl.classList.remove('dragging');clearHi();dragId=null;dragging=false;}
  else{selectedId=(selectedId===dragId)?null:dragId;dragId=null;render();}}
function targetAt(x,y){const el=document.elementFromPoint(x,y);if(!el)return null;const d=el.closest('[data-day]');if(!d)return null;if(isLocked(d.dataset.day))return null;return d.dataset.day;}
function hi(x,y){const el=document.elementFromPoint(x,y);const d=el&&el.closest('[data-day]');
  if(lastOver&&lastOver!==d)lastOver.classList.remove('over');
  if(d&&d.dataset.day!=='bank'&&!isLocked(d.dataset.day)){d.classList.add('over');lastOver=d;}else lastOver=null;}
function clearHi(){if(lastOver){lastOver.classList.remove('over');lastOver=null;}}

// info popup
const infoOv=document.getElementById('info');
document.getElementById('ifClose').onclick=()=>infoOv.classList.remove('open');
infoOv.addEventListener('click',e=>{if(e.target===infoOv)infoOv.classList.remove('open');});
function openInfo(id){
  const a=BYID[id];if(!a)return;
  document.querySelector('#info .sheet').style.setProperty('--ac',AC[a.area]);
  document.getElementById('ifTitle').textContent=`${a.ic} ${a.name}`;
  document.getElementById('ifChips').innerHTML=`<span class="cchip">${a.area}</span><span class="cchip">${a.cat}</span>`;
  document.getElementById('ifDesc').textContent=a.d||'';
  const maps=`https://www.google.com/maps/search/?api=1&query=${a.lat},${a.lng}`;
  let l=`<a class="pri" href="${maps}" target="_blank" rel="noopener">📍 גוגל מפות</a>`;
  if(a.site) l+=`<a href="${a.site}" target="_blank" rel="noopener">🌐 אתר</a>`;
  l+=`<a href="index.html" target="_blank" rel="noopener">🧭 פרטים במדריך</a>`;
  document.getElementById('ifLnks').innerHTML=l;
  infoOv.classList.add('open');
}

document.getElementById('reset').onclick=()=>{if(confirm('לנקות את כל השיבוצים? (אצל כולם)')){state=emptyState();selectedId=null;persist();render();}};
document.getElementById('loadRec').onclick=()=>{if(confirm('לטעון את שיבוץ ההמלצה? (יחליף את הקיים אצל כולם)')){state=applyAssigned(REC);selectedId=null;persist();render();}};

(async function init(){
  render();setSync('☁️ טוען…');
  const remote=await fetchRemotePlan();
  if(remote){state=applyAssigned(remote);saveLocal();render();setSync('☁️ מסונכרן');}
  else setSync(configured?'☁️ מסונכרן':'💾 מקומי');
  if(configured) setInterval(async()=>{
    if(Date.now()-lastLocalChange<30000)return;
    const r=await fetchRemotePlan();if(!r)return;
    if(norm(assignedOnly())!==norm(r)){state=applyAssigned(r);saveLocal();render();setSync('🔄 עודכן מהמשפחה');}
  },25000);
})();
</script>
